name: Verify

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  m1-local:
    name: M1 Local Verification
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Go tests
        run: GOCACHE="$PWD/.cache/go-build" go test ./...

      - name: Verify protocol contracts
        run: bun run verify:m1-contracts

      - name: Verify local M1 slices
        run: |
          bun run verify:slice1
          bun run verify:slice2
          bun run verify:slice3
          bun run verify:slice4
          bun run verify:slice5
          bun run verify:slice6
          bun run verify:slice7
          bun run verify:slice8
          bun run verify:slice9
          bun run verify:slice10
          bun run verify:slice11
          bun run verify:slice12
          bun run verify:slice12:runtime
          bun run verify:slice13
          bun run verify:m2-control-plane
          bun run verify:m2.5-codex
          bun run verify:m3-app-sdk
          bun run verify:m3.5-browser-session
          bun run verify:m4-platform-trust

      - name: Verify hosted Worker build
        run: bun run verify:slice11:build

      - name: Verify hosted Worker locally
        run: bun run verify:slice11:local

      - name: Verify M1 readiness artifacts
        run: bun run verify:m1-readiness

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: m1-local
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      NEON_DATABASE_URL: ${{ secrets.STAGING_NEON_DATABASE_URL }}
      MUSUBI_HOSTED_URL: ${{ secrets.STAGING_MUSUBI_HOSTED_URL }}
      CONTROL_PLANE_BASIC_AUTH: ${{ secrets.STAGING_CONTROL_PLANE_BASIC_AUTH }}

    steps:
      - name: Check required staging secrets
        run: |
          missing=0
          for name in CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_API_TOKEN NEON_DATABASE_URL MUSUBI_HOSTED_URL CONTROL_PLANE_BASIC_AUTH; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required for staging deploy. Configure CLOUDFLARE_ACCOUNT_ID, CLOUDFLARE_API_TOKEN, STAGING_NEON_DATABASE_URL, STAGING_MUSUBI_HOSTED_URL, and STAGING_CONTROL_PLANE_BASIC_AUTH."
              missing=1
            fi
          done
          exit "$missing"

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply staging Neon migrations
        run: bun run db:migrate:neon

      - name: Deploy staging Worker
        working-directory: server/workers
        run: TMPDIR="../../.cache/tmp" BUN_INSTALL_CACHE_DIR="../../.cache/bun" bunx wrangler deploy --env staging

  verify-staging:
    name: Verify Staging
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: deploy-staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      NEON_DATABASE_URL: ${{ secrets.STAGING_NEON_DATABASE_URL }}
      MUSUBI_HOSTED_URL: ${{ secrets.STAGING_MUSUBI_HOSTED_URL }}
      CONTROL_PLANE_BASIC_AUTH: ${{ secrets.STAGING_CONTROL_PLANE_BASIC_AUTH }}

    steps:
      - name: Check required staging verifier secrets
        run: |
          missing=0
          for name in NEON_DATABASE_URL MUSUBI_HOSTED_URL CONTROL_PLANE_BASIC_AUTH; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required for staging verification. Configure STAGING_NEON_DATABASE_URL, STAGING_MUSUBI_HOSTED_URL, and STAGING_CONTROL_PLANE_BASIC_AUTH."
              missing=1
            fi
          done
          exit "$missing"

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify deployed staging Cloudflare and Neon flow
        run: |
          bun run verify:slice11:deployed
          bun run verify:slice12:deployed
          bun run verify:slice13:deployed
          bun run verify:m4-hosted-deployed
          bun run verify:control-plane:deployed

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: verify-staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      NEON_DATABASE_URL: ${{ secrets.PROD_NEON_DATABASE_URL }}
      MUSUBI_HOSTED_URL: ${{ secrets.PROD_MUSUBI_HOSTED_URL }}

    steps:
      - name: Check required production secrets
        run: |
          missing=0
          for name in CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_API_TOKEN NEON_DATABASE_URL MUSUBI_HOSTED_URL; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required for production deploy. Configure CLOUDFLARE_ACCOUNT_ID, CLOUDFLARE_API_TOKEN, PROD_NEON_DATABASE_URL, and PROD_MUSUBI_HOSTED_URL."
              missing=1
            fi
          done
          exit "$missing"

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply production Neon migrations
        run: bun run db:migrate:neon

      - name: Deploy production Worker
        working-directory: server/workers
        run: TMPDIR="../../.cache/tmp" BUN_INSTALL_CACHE_DIR="../../.cache/bun" bunx wrangler deploy --env=""

  verify-production-smoke:
    name: Verify Production Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: deploy-production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      MUSUBI_HOSTED_URL: ${{ secrets.PROD_MUSUBI_HOSTED_URL }}

    steps:
      - name: Check required production smoke secret
        run: |
          if [ -z "$MUSUBI_HOSTED_URL" ]; then
            echo "::error::MUSUBI_HOSTED_URL is required for production smoke verification. Configure PROD_MUSUBI_HOSTED_URL."
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify production health
        run: bun run verify:production-smoke
