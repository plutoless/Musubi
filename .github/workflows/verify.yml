name: Verify

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  m1-local:
    name: M1 Local Verification
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Go tests
        run: GOCACHE="$PWD/.cache/go-build" go test ./...

      - name: Verify protocol contracts
        run: bun run verify:m1-contracts

      - name: Verify local M1 slices
        run: |
          bun run verify:slice1
          bun run verify:slice2
          bun run verify:slice3
          bun run verify:slice4
          bun run verify:slice5
          bun run verify:slice6
          bun run verify:slice7
          bun run verify:slice8
          bun run verify:slice9
          bun run verify:slice10
          bun run verify:slice11
          bun run verify:slice12
          bun run verify:slice12:runtime
          bun run verify:slice13
          bun run verify:m2-control-plane
          bun run verify:m2.5-codex
          bun run verify:m3-app-sdk
          bun run verify:m3.5-browser-session
          bun run verify:m4-platform-trust

      - name: Verify hosted Worker build
        run: bun run verify:slice11:build

      - name: Verify hosted Worker locally
        run: bun run verify:slice11:local

      - name: Verify M1 readiness artifacts
        run: bun run verify:m1-readiness

  m1-deployed:
    name: M1 Deployed Verification
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: m1-local
    if: github.event_name == 'push'

    env:
      MUSUBI_HOSTED_URL: ${{ secrets.MUSUBI_HOSTED_URL }}
      NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}

    steps:
      - name: Check configured secrets
        id: secrets
        run: |
          if [ -n "$MUSUBI_HOSTED_URL" ] && [ -n "$NEON_DATABASE_URL" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Skipping deployed verification because MUSUBI_HOSTED_URL and/or NEON_DATABASE_URL secrets are not configured."
          fi

      - name: Check out repository
        if: steps.secrets.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Set up Bun
        if: steps.secrets.outputs.configured == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Go
        if: steps.secrets.outputs.configured == 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install dependencies
        if: steps.secrets.outputs.configured == 'true'
        run: bun install --frozen-lockfile

      - name: Apply Neon migrations
        if: steps.secrets.outputs.configured == 'true'
        run: bun run db:migrate:neon

      - name: Verify deployed Cloudflare and Neon flow
        if: steps.secrets.outputs.configured == 'true'
        run: |
          bun run verify:slice11:deployed
          bun run verify:slice12:deployed
          bun run verify:slice13:deployed
