name: Verify

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "**"

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-ci:
    name: Core CI (Unit + Local Integration)
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run core CI gate
        run: bun run test:ci:core

  hosted-local:
    name: Hosted-Local Integration (Wrangler Dev + Neon)
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: core-ci
    if: ${{ secrets.STAGING_NEON_DATABASE_URL != '' }}
    env:
      NEON_DATABASE_URL: ${{ secrets.STAGING_NEON_DATABASE_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check hosted-local Neon secret
        run: |
          if [ -z "$NEON_DATABASE_URL" ]; then
            echo "::error::NEON_DATABASE_URL is required for hosted-local integration. Configure STAGING_NEON_DATABASE_URL to run the Wrangler dev + Neon tier."
            exit 1
          fi

      - name: Run hosted-local integration tier
        run: bun run test:integration:hosted-local

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: core-ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      NEON_DATABASE_URL: ${{ secrets.STAGING_NEON_DATABASE_URL }}
      MUSUBI_HOSTED_URL: ${{ secrets.STAGING_MUSUBI_HOSTED_URL }}
      CONTROL_PLANE_BASIC_AUTH: ${{ secrets.STAGING_CONTROL_PLANE_BASIC_AUTH }}

    steps:
      - name: Check required staging secrets
        run: |
          missing=0
          for name in CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_API_TOKEN NEON_DATABASE_URL MUSUBI_HOSTED_URL CONTROL_PLANE_BASIC_AUTH; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required for staging deploy. Configure CLOUDFLARE_ACCOUNT_ID, CLOUDFLARE_API_TOKEN, STAGING_NEON_DATABASE_URL, STAGING_MUSUBI_HOSTED_URL, and STAGING_CONTROL_PLANE_BASIC_AUTH."
              missing=1
            fi
          done
          exit "$missing"

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply staging Neon migrations
        run: bun run db:migrate:neon

      - name: Deploy staging Worker
        working-directory: server/workers
        run: TMPDIR="../../.cache/tmp" BUN_INSTALL_CACHE_DIR="../../.cache/bun" bunx wrangler deploy --env staging

  remote-e2e-staging:
    name: Remote E2E Smoke (Deployed Staging)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: deploy-staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      NEON_DATABASE_URL: ${{ secrets.STAGING_NEON_DATABASE_URL }}
      MUSUBI_HOSTED_URL: ${{ secrets.STAGING_MUSUBI_HOSTED_URL }}
      CONTROL_PLANE_BASIC_AUTH: ${{ secrets.STAGING_CONTROL_PLANE_BASIC_AUTH }}

    steps:
      - name: Check required remote smoke secrets
        run: |
          missing=0
          for name in NEON_DATABASE_URL MUSUBI_HOSTED_URL CONTROL_PLANE_BASIC_AUTH; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required for remote E2E smoke. Configure STAGING_NEON_DATABASE_URL, STAGING_MUSUBI_HOSTED_URL, and STAGING_CONTROL_PLANE_BASIC_AUTH."
              missing=1
            fi
          done
          exit "$missing"

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run minimum deployed smoke suite
        run: bun run test:e2e:remote

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: remote-e2e-staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      NEON_DATABASE_URL: ${{ secrets.PROD_NEON_DATABASE_URL }}
      MUSUBI_HOSTED_URL: ${{ secrets.PROD_MUSUBI_HOSTED_URL }}

    steps:
      - name: Check required production secrets
        run: |
          missing=0
          for name in CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_API_TOKEN NEON_DATABASE_URL MUSUBI_HOSTED_URL; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required for production deploy. Configure CLOUDFLARE_ACCOUNT_ID, CLOUDFLARE_API_TOKEN, PROD_NEON_DATABASE_URL, and PROD_MUSUBI_HOSTED_URL."
              missing=1
            fi
          done
          exit "$missing"

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply production Neon migrations
        run: bun run db:migrate:neon

      - name: Deploy production Worker
        working-directory: server/workers
        run: TMPDIR="../../.cache/tmp" BUN_INSTALL_CACHE_DIR="../../.cache/bun" bunx wrangler deploy --env=""

  verify-production-smoke:
    name: Verify Production Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: deploy-production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      MUSUBI_HOSTED_URL: ${{ secrets.PROD_MUSUBI_HOSTED_URL }}

    steps:
      - name: Check required production smoke secret
        run: |
          if [ -z "$MUSUBI_HOSTED_URL" ]; then
            echo "::error::MUSUBI_HOSTED_URL is required for production smoke verification. Configure PROD_MUSUBI_HOSTED_URL."
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify production health
        run: bun run verify:production-smoke
