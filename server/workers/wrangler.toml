name = "musubi-m1"
main = "src/index.ts"
compatibility_date = "2026-05-06"

[assets]
directory = "../../apps/control-plane"
binding = "ASSETS"
run_worker_first = true
html_handling = "none"

[[durable_objects.bindings]]
name = "DEVICE_SESSION"
class_name = "DeviceSession"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["DeviceSession"]

[vars]
MUSUBI_ENV = "production"
CONTROL_PLANE_ENABLED = "false"

[env.staging]

[[env.staging.durable_objects.bindings]]
name = "DEVICE_SESSION"
class_name = "DeviceSession"

[env.staging.vars]
MUSUBI_ENV = "staging"
CONTROL_PLANE_ENABLED = "true"

# Configure in Cloudflare dashboard or wrangler secret:
# NEON_DATABASE_URL
# CONTROL_PLANE_BASIC_AUTH
